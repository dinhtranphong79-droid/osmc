<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osmc</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.full.min.js"></script>
    
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-btn:hover { background: #bbb; }
        #tab-content { padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 200px; }
    </style>
</head>
<body>

    <h2>osmc</h2>

    <div class="tab-menu">
        <button class="tab-btn" onclick="loadTab('phao', this)">Tab Pháo</button>
        <button class="tab-btn" onclick="loadTab('tuong', this)">Tab Tướng</button>
        <button class="tab-btn" onclick="loadTab('bangsuong', this)">Tab Băng Sương</button>
    </div>

    <div id="tab-content">
        <p>Vui lòng chọn một tab để xem nội dung...</p>
    </div>

    <script>
        function loadTab(tabName, element) {
            // Cập nhật trạng thái Active cho nút
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const contentDiv = document.getElementById('tab-content');
            
            // Dùng Fetch API để lấy nội dung từ file html riêng
            fetch(`${tabName}.html`)
                .then(response => {
                    if (!response.ok) throw new Error('Không tìm thấy file ' + tabName + '.html');
                    return response.text();
                })
                .then(data => {
                    contentDiv.innerHTML = data;

                    // 3. QUAN TRỌNG: ÉP CHẠY SCRIPT TRONG TAB CON (ĐỂ XUẤT EXCEL ĐƯỢC)
                    const scripts = contentDiv.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");
                        // Sao chép nội dung script
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        } else {
                            newScript.text = oldScript.text;
                        }
                        document.body.appendChild(newScript).parentNode.removeChild(newScript);
                    });
                })
                .catch(error => {
                    contentDiv.innerHTML = `<p style='color:red;'>Lỗi: ${error.message}</p>`;
                });
        }

        // Mặc định load tab đầu tiên khi trang vừa mở
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            if(firstBtn) firstBtn.click();
        };
    </script>
</body>
</html>
