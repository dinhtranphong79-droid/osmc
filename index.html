<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>osmc</title>
    <script src="https://unpkg.com/exceljs@4.3.0/dist/exceljs.full.min.js"></script>
    <script src="https://unpkg.com/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: #ddd; border-radius: 5px; transition: 0.3s; font-weight: bold; }
        .tab-btn.active { background: #007bff; color: white; }
        .tab-btn:hover { background: #bbb; }
        #tab-content { padding: 20px; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); min-height: 200px; }
    </style>
</head>
<body>

    <h2>osmc</h2>

    <div class="tab-menu">
        <button class="tab-btn" onclick="loadTab('phao', this)">Pháo</button>
        <button class="tab-btn" onclick="loadTab('tuong', this)">Tướng</button>
        <button class="tab-btn" onclick="loadTab('thienphu', this)">Tiến hóa lính</button>
        <button class="tab-btn" onclick="loadTab('ren', this)">Cường hóa trang bị tướng</button>
        <button class="tab-btn" onclick="loadTab('phuthuy', this)">Phù thủy (đang update)</button>
        <button class="tab-btn" onclick="loadTab('thutrieuhoi', this)">Thú triệu hồi</button>
    </div>

    <div id="tab-content">
        <p>Vui lòng chọn một tab để xem nội dung...</p>
    </div>

    <script>
       function loadTab(tabName, element) {
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            const contentDiv = document.getElementById('tab-content');
            
            fetch(`${tabName}.html`)
                .then(response => {
                    if (!response.ok) throw new Error(`Không tìm thấy file ${tabName}.html`);
                    return response.text();
                })
                .then(data => {
                    // 1. Dọn dẹp các script cũ gắn thẻ 'data-tab-script' trước khi nạp tab mới
                    const oldTabScripts = document.head.querySelectorAll('[data-tab-script]');
                    oldTabScripts.forEach(script => script.remove());

                    // 2. Nạp nội dung HTML vào giao diện
                    contentDiv.innerHTML = data;

                    // 3. Xử lý kích hoạt chạy Script của tab mới một cách an toàn
                    const scripts = contentDiv.querySelectorAll("script");
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement("script");

                        // Sao chép các thuộc tính vốn có
                        Array.from(oldScript.attributes).forEach(attr => {
                            newScript.setAttribute(attr.name, attr.value);
                        });

                        // Đánh dấu đây là script của tab để dễ dọn dẹp ở lần chuyển tab sau
                        newScript.setAttribute('data-tab-script', tabName);

                        if (!oldScript.src) {
                            newScript.text = oldScript.innerHTML;
                        }

                        // Chèn thẳng vào head để thực thi toàn diện
                        document.head.appendChild(newScript);
                        
                        // Loại bỏ script gốc bên trong div content để tránh hiển thị thừa trên DOM tree
                        oldScript.remove();
                    });
                })
                .catch(error => {
                    contentDiv.innerHTML = `<p style='color:red;'>Lỗi: ${error.message}</p>`;
                    console.error("Lỗi tải Tab:", error);
                });
        }

        // Tự động kích hoạt tab đầu tiên khi trang tải xong
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            if (firstBtn) firstBtn.click();
        };
    </script>
</body>
</html>
