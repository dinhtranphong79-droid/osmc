

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Arial,sans-serif;
    background:#f1f5f9;
    padding:20px;
}

.main-card{
    max-width:900px;
    margin:auto;
    background:#fff;
    border-radius:14px;
    overflow:hidden;
    border:1px solid #dbe3ee;
    box-shadow:0 4px 15px rgba(0,0,0,.08);
}

.header{
    background:#2563eb;
    color:white;
    padding:18px;
    font-size:24px;
    font-weight:700;
}

.content{
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    font-size:14px;
    margin-bottom:6px;
    font-weight:600;
    color:#334155;
}

.form-group input,
.form-group select{
    height:42px;
    border:1px solid #cbd5e1;
    border-radius:8px;
    padding:0 12px;
    font-size:14px;
}

.form-group input:focus,
.form-group select:focus{
    outline:none;
    border-color:#2563eb;
}

.total-buff{
    margin-top:12px;
    font-size:13px;
    font-weight:700;
    color:#2563eb;
}

.btn-wrap{
    margin-top:18px;
}

.btn{
    width:100%;
    height:46px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.btn:hover{
    background:#1d4ed8;
}

.result{
    margin-top:20px;
    border-top:1px solid #e2e8f0;
    padding-top:20px;
}

.result-title{
    font-size:18px;
    font-weight:700;
    margin-bottom:15px;
}

.result-row{
    display:flex;
    justify-content:space-between;
    padding:10px 0;
    border-bottom:1px solid #f1f5f9;
}

.result-row span:first-child{
    color:#475569;
}

.result-row span:last-child{
    font-weight:700;
}

@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>


<div class="main-card">

    <div class="header">
        Thú Triệu Hồi
    </div>

    <div class="content">

        <div class="grid">

            <div class="form-group">
                <label>Thú</label>
                <select id="pet">
                    <option value="T1">T1 - Cây</option>
                    <option value="T2">T2 - Cá mập</option>
                    <option value="T3">T3 - Ngựa</option>
                    <option value="T4">T4 - Phượng</option>
                    <option value="T5">T5 - Kiếm</option>
                    <option value="T6">T6 - Khủng long</option>
                    <option value="T7">T7 - Xe bí</option>
                    <option value="T8">T8 - Rồng</option>
                </select>
            </div>

            <div class="form-group">
                <label>Lv hiện tại</label>
                <input type="number" id="startLevel" value="1" min="1" max="20">
            </div>

            <div class="form-group">
                <label>Bùa tím</label>
                <input class="number-input" id="advanced" type="text">
            </div>

            <div class="form-group">
                <label>Bùa vàng</label>
                <input class="number-input" id="perfect" type="text">
            </div>

            <div class="form-group">
                <label>Chuyên gia đối đầu 1 (%)</label>
                <input id="buff1" type="number" value="0">
            </div>

            <div class="form-group">
                <label>Chuyên gia đối đầu 2 (%)</label>
                <input id="buff2" type="number" value="0">
            </div>

            <div class="form-group">
                <label>Đối đầu - Trận triệu hồi (%)</label>
                <input id="buff3" type="number" value="0">
            </div>

        </div>

        <div class="total-buff">
            Tổng % tăng thêm: <span id="totalBuff">0%</span>
        </div>

        <div class="btn-wrap">
            <button class="btn" onclick="calculate()">
                TÍNH
            </button>
        </div>

        <div class="result">

            <div class="result-title">
                Kết quả
            </div>

            <div class="result-row">
                <span>Lv đạt được</span>
                <span id="rLv">-</span>
            </div>

            <div class="result-row">
                <span>Bùa tím đã dùng</span>
                <span id="rAdvUsed">-</span>
            </div>

            <div class="result-row">
                <span>Bùa vàng đã dùng</span>
                <span id="rPerUsed">-</span>
            </div>

            <div class="result-row">
                <span>Bùa tím còn dư</span>
                <span id="rAdvLeft">-</span>
            </div>

            <div class="result-row">
                <span>Bùa vàng còn dư</span>
                <span id="rPerLeft">-</span>
            </div>

            <div class="result-row">
                <span>TỔNG ĐIỂM</span>
                <span id="rPoint">-</span>
            </div>

        </div>

    </div>
</div>

function formatNumber(num){
    return Math.round(num).toLocaleString('en-US');
}

function getNumber(id){
    return Number(
        document.getElementById(id).value.replace(/,/g,'')
    ) || 0;
}

document.querySelectorAll('.number-input').forEach(input=>{

    input.addEventListener('input',function(){

        let value=this.value.replace(/,/g,'');

        value=value.replace(/\D/g,'');

        if(value===''){
            this.value='';
            return;
        }

        this.value=Number(value).toLocaleString('en-US');

    });

});

    const pet=document.getElementById('pet').value;

    const startLv=
    Number(document.getElementById('startLevel').value);
    if(startLv >= 20){

    document.getElementById('rLv').textContent = '20 (MAX)';
    document.getElementById('rAdvUsed').textContent = '0';

        formatNumber(getNumber('advanced'));
    document.getElementById('rPerLeft').textContent =

    let adv=getNumber('advanced');
    let per=getNumber('perfect');

    const data=summonData[pet];

    let currentLv=startLv;

    let usedAdv=0;
    let usedPer=0;

    for(let i=startLv-1;i<19;i++){

        const needAdv=data.advanced[i];
        const needPer=data.perfect[i];

        if(
            adv>=needAdv &&
            per>=needPer
        ){

            adv-=needAdv;
            per-=needPer;

            usedAdv+=needAdv;
            usedPer+=needPer;

            currentLv++;

        }else{
            break;
        }

    }

    const totalBuff=
    (+buff1.value||0)+
    (+buff2.value||0)+
    (+buff3.value||0);

    const point=
    (
        usedAdv*ADV_POINT +
        usedPer*PERFECT_POINT
    )
    *
    (1+totalBuff/100);

   document.getElementById('rLv').textContent = currentLv;
    document.getElementById('rAdvUsed').textContent = formatNumber(usedAdv);
    document.getElementById('rPerUsed').textContent = formatNumber(usedPer);
    document.getElementById('rAdvLeft').textContent = formatNumber(adv);
    document.getElementById('rPerLeft').textContent = formatNumber(per);
    document.getElementById('rPoint').textContent = formatNumber(point);
