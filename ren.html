<div class="tab-content-ren">
<style>
.tab-content-ren{
    font-family: Arial,sans-serif;
    color:#1e293b;
}

.tab-content-ren .main-card{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:12px;
    overflow:hidden;
    border:1px solid #e2e8f0;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
}

.tab-content-ren .header{
    background:#2563eb;
    color:white;
    padding:20px;
}

.tab-content-ren .header h1{
    margin:0;
    font-size:24px;
}

.tab-content-ren .content{
    padding:20px;
}

.tab-content-ren h2{
    font-size:18px;
    margin-bottom:15px;
    border-bottom:1px solid #e2e8f0;
    padding-bottom:8px;
}

.tab-content-ren .grid-3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.tab-content-ren .grid-2{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.tab-content-ren .field{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#f8fafc;
    padding:10px;
    border-radius:8px;
    border:1px solid #e2e8f0;
}

.tab-content-ren input,
.tab-content-ren select{
    padding:6px;
    border:1px solid #cbd5e1;
    border-radius:6px;
    width:80px;
    text-align:center;
}

.tab-content-ren .buff-boxes{
    display:flex;
    gap:15px;
    margin:20px 0;
}

.tab-content-ren .buff-box{
    flex:1;
    text-align:center;
    padding:15px;
    border-radius:10px;
}

.tab-content-ren .blue{
    background:#eff6ff;
}

.tab-content-ren .green{
    background:#ecfdf5;
}

.tab-content-ren .equip-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.tab-content-ren .equip-item{
    background:#f8fafc;
    border:1px solid #e2e8f0;
    border-radius:8px;
    padding:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.tab-content-ren .btn{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    padding:15px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.tab-content-ren .btn:hover{
    background:#1d4ed8;
}

.tab-content-ren .result{
    margin-top:20px;
    padding:15px;
    background:#f1f5f9;
    border-radius:8px;
}
.tab-content-ren .input-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
}

.tab-content-ren .input-row:last-child{
    margin-bottom:0;
}
@media(max-width:768px){

.tab-content-ren .grid-3,
.tab-content-ren .grid-2,
.tab-content-ren .equip-grid{
    grid-template-columns:1fr;
}

.tab-content-ren .buff-boxes{
    flex-direction:column;
}

}
</style>
<div class="main-card">
    <div class="header">
        <h1 class="text-2xl font-bold">Cường hóa trang bị tướng</h1>
    </div>

    <div class="content">
        <h2 class="font-bold text-lg text-slate-700 mb-4 border-b pb-2">Tài nguyên hiện có</h2>
        <div class="mb-8">
           <div class="input-row">
    <label>Búa rèn:</label>
    <input type="number" id="resBua" class="w-24 p-2 border rounded text-center">
</div>

<div class="input-row">
    <label>Máu titan:</label>
    <input type="number" id="resMau" class="w-24 p-2 border rounded text-center">
</div>

<div class="input-row">
    <label>Bình nguyên tố:</label>
    <input type="number" id="resBinh" class="w-24 p-2 border rounded text-center">
</div>
</div>
        <h2 class="font-bold text-lg text-slate-700 mb-4 border-b pb-2">Đối đầu (Để trống nếu tính lcch)</h2>
      <div class="mb-6">
           <div class="input-row">
    <label>Chuyên gia đối đầu 1 (%):</label>
    <input type="number" id="cg1" class="pct-input w-24 p-2 border rounded text-center">
</div>


<div class="input-row">
    <label>Chuyên gia đối đầu 2 (%):</label>
    <input type="number" id="cg2" class="pct-input w-24 p-2 border rounded text-center">
</div>

<div class="input-row">
    <label>Đối đầu - Tiệm rèn (%):</label>
    <input type="number" id="tr" class="pct-input w-24 p-2 border rounded text-center">
</div>

<div class="input-row">
    <label>Đối đầu - Trang bị tướng (%):</label>
    <input type="number" id="tb" class="pct-input w-24 p-2 border rounded text-center">
</div>
        </div>

       <div style="
    margin:24px 0;
    text-align:right;
">

    <div style="
        color:#16a34a;
        font-size:14px;
        font-weight:700;
        margin-bottom:8px;
    ">
        Tổng % tăng thêm - Búa rèn:
        <span id="sumBua">0%</span>
    </div>

    <div style="
        color:#2563eb;
        font-size:14px;
        font-weight:700;
    ">
        Tổng % tăng thêm - Trang bị tướng:
        <span id="sumTrangbi">0%</span>
    </div>

</div>

        <h2 class="font-bold text-lg text-slate-700 mb-4">Danh sách trang bị</h2>
        <div id="equipmentSlots" class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-8"></div>

        <button onclick="optimizeRen()" class="btn">Tính</button>

        <div id="result" class="result hidden"></div>
    </div>
</div>

<script>
(function () {
    const table = {
        'T5': [[0,0],[280,0],[470,0],[680,0],[900,0],[1140,0],[1400,0],[1660,0],[1930,0],[2220,0],[2510,320],[2810,360],[3120,400],[3430,440],[3750,480],[4080,525],[4410,565],[4750,605],[5100,650],[5450,695]],
        'T6': [[0,0],[1370,0],[2320,0],[3370,0],[4500,0],[5700,0],[6980,0],[8280,0],[9650,0],[11070,0],[12520,1595],[14020,1785],[15560,1980],[17130,2180],[18740,2380],[20380,2590],[22050,2805],[23750,3020],[25480,3240],[27240,3460]],
        'T7': [[0,0],[6825,0],[11561,0],[16804,0],[22459,0],[28466,0],[34783,0],[41376,0],[48223,0],[55301,0],[62596,7950],[70093,8902],[77779,9878],[85645,10877],[93682,11898],[101881,12940],[110235,14001],[118738,15081],[127384,16179],[136168,17294]],
        'T8': [[0,0],[34123,0],[57805,0],[84020,0],[112297,0],[142332,0],[173934,0],[206882,0],[241114,0],[276507,0],[312980,39751],[350483,44551],[388895,49392],[428226,54387],[468409,59491],[509404,64698],[551178,70003],[593691,75403],[636922,80893],[680841,86471]],
        'T9': [[0,0],[170614,0],[289032,0],[420902,0],[561484,0],[711661,0],[886169,0],[1034412,0],[1205568,0],[1382536,0],[1564901,198753],[1752314,222555],[1944477,246961],[2141129,271937],[2347024,297455],[2547020,323488],[2755878,350015],[2968456,377013],[3184609,404446],[3404203,432356]]
    };

    // 1. Khởi tạo danh sách trang bị duy nhất
    const container = document.getElementById('equipmentSlots');
    container.innerHTML = '';
    for(let i=1; i<=15; i++) {
        container.innerHTML += `
        <div class="equip-item">
            <span class="font-bold text-xs">Trang bị ${i}</span>
            <select class="tVal text-xs p-1"><option>T9</option><option>T8</option><option>T7</option><option>T6</option><option>T5</option></select>
            <input type="number" class="lVal w-12 p-1 text-xs text-center border" value="1" min="1" max="19">
        </div>`;
    }

    // 2. Sự kiện cập nhật hiển thị %
    document.querySelectorAll('.pct-input').forEach(i => i.addEventListener('input', updatePct));
    function updatePct() {
        const cg1 = parseFloat(document.getElementById('cg1').value)||0, cg2 = parseFloat(document.getElementById('cg2').value)||0, tr = parseFloat(document.getElementById('tr').value)||0, tb = parseFloat(document.getElementById('tb').value)||0;
        document.getElementById('sumBua').innerText = (cg1 + cg2 + tr) + "%";
        document.getElementById('sumTrangbi').innerText = (cg1 + cg2 + tb) + "%";
    }

    // 3. Hàm tính toán logic
    window.optimizeRen = function() {
        let totalBuaOwned = parseInt(document.getElementById('resBua').value) || 0;
        let maxBinh = parseInt(document.getElementById('resBinh').value) || 0;
        let maxMau = parseInt(document.getElementById('resMau').value) || 0;

        const buffBua = 1 + (parseFloat(document.getElementById('sumBua').innerText) || 0) / 100;
        const buffTb = 1 + (parseFloat(document.getElementById('sumTrangbi').innerText) || 0) / 100;

        let items = [];
        document.querySelectorAll('#equipmentSlots > div').forEach((div, idx) => {
            items.push({ t: div.querySelector('.tVal').value, lvl: parseInt(div.querySelector('.lVal').value), id: idx + 1 });
        });

        items.sort((a, b) => (b.t.localeCompare(a.t)) || (b.lvl - a.lvl));

        let usedBinh = 0, usedMau = 0, step = 1;
        let resHtml = "<h3 class='font-bold mb-2'>Các bước nâng cấp:</h3><ul class='text-sm space-y-1'>";

        items.forEach(item => {
            let startLvl = item.lvl;
            let upgraded = false;
            while (item.lvl < 20) {
                let costs = table[item.t][item.lvl];
                if (maxBinh >= costs[0] && maxMau >= costs[1]) {
                    maxBinh -= costs[0];
                    maxMau -= costs[1];
                    usedBinh += costs[0];
                    usedMau += costs[1];
                    item.lvl++;
                    upgraded = true;
                } else { break; }
            }
            if(upgraded){
                resHtml += `<li><b>B${step++}</b>: Trang bị ${item.id} (${item.t}) Lv${startLvl} → Lv${item.lvl}</li>`;
            }
        });

        // Tùy chỉnh hệ số tại đây để khớp con số 30.100.000
        let pBua = totalBuaOwned * 100 * buffBua;
        let pMau = (usedMau / 25) * 280 * buffTb;
        let pBinh = (usedBinh / 125) * 140 * buffTb;

        resHtml += `</ul><div class='mt-4 p-4 bg-blue-600 text-white rounded-lg font-bold'>
            <p>TỔNG ĐIỂM: ${Math.round(pBua + pMau + pBinh).toLocaleString()}</p>
        </div>`;
        document.getElementById('result').innerHTML = resHtml;
        document.getElementById('result').classList.remove('hidden');
    };
})();
</script>

</div>
</div>
